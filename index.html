<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Planning Tournées Cabinet</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        :root {
            --bg-color: #f4f6f9;
            --card-bg: #ffffff;
            --text-color: #333333;
            --primary: #007aff;
            --success: #34c759;
            --danger: #ff3b30; 
            --neutral: #8e8e93;
            --purple: #5856d6;
            --orange: #ff9500;
            --tla-color: #34c759;
        }

        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; background-color: var(--bg-color); color: var(--text-color); margin: 0; padding: 15px; }

        /* [RESTE DU CSS IDENTIQUE AU PRÉCÉDENT...] */
        /* Note : Pour la concision, le CSS est identique à la version précédente */
    </style>
</head>
<body>

    <script>
        const SUPABASE_URL = "https://fzlyucjfbjvbodqykihf.supabase.co";
        const SUPABASE_KEY = "sb_publishable_472y-YwY-VyEsRz7nqaMJg_LC3W6gDJ";
        let supabaseClient = null;

        // ... (Variables globales inchangées)

        function brancherTempsReel() {
            if (!initialiserSupabase()) return;

            // Canal unique pour tout gérer efficacement
            supabaseClient.channel('cabinet-sync')
            .on('postgres_changes', { event: '*', schema: 'public', table: 'plannings_dates' }, () => {
                chargerDonneesDepuisServeur();
            })
            // Canal dédié aux changements de détenteur TLA
            .on('postgres_changes', { event: 'UPDATE', schema: 'public', table: 'practiciens' }, (payload) => {
                console.log("Synchronisation TLA en temps réel...");
                chargerListeKines(); 
            })
            .subscribe();
        }

        /* Fonction mise à jour pour gérer le badge TLA */
        function gererAffichageGlobalTla() {
            const badgeGlobal = document.getElementById('affichage-tla-detenteur');
            const selectDeclaration = document.getElementById('select-declaration-tla');
            
            const detenteurActuel = listeUtilisateursComplets.find(u => u.detient_tla === true);
            const nomDetenteur = detenteurActuel ? detenteurActuel.nom : "Cabinet";

            if (badgeGlobal) {
                if (nomDetenteur === "Cabinet") {
                    badgeGlobal.innerHTML = `🏢 TLA : <b>Au Cabinet</b>`;
                    badgeGlobal.style.borderColor = "var(--neutral)";
                    badgeGlobal.style.color = "#555";
                    badgeGlobal.style.background = "#e5e5ea";
                } else {
                    badgeGlobal.innerHTML = `📍 TLA avec : <b>${nomDetenteur}</b>`;
                    badgeGlobal.style.borderColor = "#00c7b1";
                    badgeGlobal.style.color = "#008777";
                    badgeGlobal.style.background = "#eefdfb";
                }
            }

            if (selectDeclaration && selectDeclaration.value !== nomDetenteur) {
                selectDeclaration.value = nomDetenteur;
            }
        }

        async function declarerDetenteurTla(valeurSelectionnee) {
            if (!initialiserSupabase()) return;
            try {
                // Étape 1 : Tout remettre à false
                await supabaseClient.from('practiciens').update({ detient_tla: false }).neq('id', '0');
                
                // Étape 2 : Mettre à true le nouveau détenteur
                if (valeurSelectionnee !== "Cabinet") {
                    await supabaseClient.from('practiciens').update({ detient_tla: true }).eq('nom', valeurSelectionnee);
                }
            } catch (err) {
                console.error("Erreur mise à jour TLA :", err);
            }
        }

        // ... (Tout le reste du code reste identique)
    </script>
</body>
</html>
