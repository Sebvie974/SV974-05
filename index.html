<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Planning Tournées Cabinet</title>
    <link rel="manifest" href="manifest.json">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        :root { --bg-color: #f4f6f9; --card-bg: #ffffff; --text-color: #333333; --primary: #007aff; --success: #34c759; --danger: #ff3b30; --neutral: #8e8e93; --purple: #5856d6; --orange: #ff9500; }
        body { font-family: -apple-system, sans-serif; background-color: var(--bg-color); color: var(--text-color); margin: 0; padding: 15px; }
        #login-screen { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: var(--bg-color); display: flex; flex-direction: column; justify-content: center; align-items: center; z-index: 100; }
        .login-box { background: white; padding: 30px; border-radius: 16px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); width: 90%; max-width: 350px; display: flex; flex-direction: column; gap: 12px; }
        #main-app { display: none; }
        header { background: var(--card-bg); padding: 15px; border-radius: 12px; box-shadow: 0 2px 8px rgba(0,0,0,0.05); margin-bottom: 15px; }
        .btn-primary { background-color: var(--primary); color: white; padding: 10px; border-radius: 8px; font-weight: bold; border: none; cursor: pointer; }
        .patient-card { background: white; padding: 12px; border-radius: 12px; margin-bottom: 10px; display: flex; justify-content: space-between; align-items: center; border-left: 5px solid var(--purple); box-shadow: 0 2px 5px rgba(0,0,0,0.03); }
        .patient-name { font-weight: 600; font-size: 1.05rem; display: block; margin-bottom: 4px; }
        .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); z-index: 120; justify-content: center; align-items: center; }
        .modal-content { background: white; padding: 20px; border-radius: 16px; width: 90%; max-width: 400px; display: flex; flex-direction: column; gap: 10px; }
        input, select, textarea { width: 100%; padding: 10px; border-radius: 8px; border: 1px solid #ccc; box-sizing: border-box; }
        .sync-indicator { font-size: 0.8rem; padding: 4px 8px; border-radius: 12px; font-weight: bold; margin-bottom: 5px; display: inline-block; }
        .sync-online { background: #d4edda; color: #155724; }
        .sync-offline { background: #f8d7da; color: #721c24; }
    </style>
</head>
<body>

    <div id="login-screen">
        <div class="login-box">
            <h2>Accès Cabinet</h2>
            <select id="kine-select-login"><option value="">Chargement...</option></select>
            <input type="password" id="password-input" placeholder="Mot de passe">
            <button class="btn-primary" onclick="verifierConnexion()">Se connecter</button>
            <div id="config-panel" style="display:none; margin-top:15px; border-top:1px solid #ccc; padding-top:10px;">
                <input type="text" id="nouveau-kine-input" placeholder="Nom">
                <input type="password" id="nouveau-mdp-input" placeholder="MDP">
                <select id="nouveau-role-input"><option value="kine">Kiné</option><option value="remplacant">Remplaçant</option><option value="secretariat">Secrétariat</option></select>
                <select id="nouveau-kine-remplace-input" style="display:none;"></select>
                <button onclick="sauvegarderKine()">Ajouter/Modifier</button>
            </div>
            <button onclick="basculerAffichageConfig('login')" style="background:none; border:none; margin-top:10px; color:var(--neutral);">⚙️ Admin</button>
        </div>
    </div>

    <div id="main-app">
        <header>
            <h1 id="app-title">Planning</h1>
            <span id="nom-kine-badge" style="font-weight:bold; color:var(--purple);">Session : ...</span><br>
            <div id="sync-badge" class="sync-indicator">Chargement...</div><br>
            <button onclick="deconnexion()" style="background:none; border:none; color:red;">Déconnexion</button>
            <button onclick="basculerVue()" id="btn-toggle-view" class="btn-primary" style="margin-top:10px;">Fichier Patients</button>
        </header>
        <main>
            <div id="view-planning" class="app-view active"></div>
            <div id="view-fichier" class="app-view" style="display:none;"></div>
        </main>
    </div>

    <div class="modal" id="modal-patient"><div class="modal-content"><h3 id="patient-modal-title">Fiche Patient</h3><input type="hidden" id="patient-id"><input type="text" id="patient-nom" placeholder="Nom"><input type="text" id="patient-adresse" placeholder="Adresse"><button class="btn-primary" onclick="sauvegarderFichePatient()">Enregistrer</button><button onclick="fermerModal('modal-patient')">Annuler</button></div></div>

    <script>
        const SUPABASE_URL = "https://fzlyucjfbjvbodqykihf.supabase.co";
        const SUPABASE_KEY = "sb_publishable_472y-YwY-VyEsRz7nqaMJg_LC3W6gDJ";
        let supabaseClient = null, kineConnecte = "", kineRole = "kine", kineRemplace = "", kineVisionne = "", cataloguePatients = [], planningsParDate = [];

        function initialiserSupabase() { if (!supabaseClient) supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_KEY); return true; }

        window.addEventListener('DOMContentLoaded', async () => {
            initialiserSupabase();
            await chargerListeKines();
            if (localStorage.getItem('kine_connecte') === 'true') {
                kineConnecte = localStorage.getItem('kine_nom_actif');
                kineRole = localStorage.getItem('kine_role_actif');
                kineRemplace = localStorage.getItem('kine_remplace_actif') || "";
                kineVisionne = (kineRole === 'remplacant' && kineRemplace) ? kineRemplace : (kineRole === 'secretariat' ? 'TOUS' : kineConnecte);
                initialiserApplication();
            }
        });

        function initialiserApplication() {
            document.getElementById('login-screen').style.display = 'none';
            document.getElementById('main-app').style.display = 'block';
            modifierBadgeReseau(navigator.onLine);
            chargerDonneesDepuisServeur();
        }

        async function chargerDonneesDepuisServeur() {
            try {
                const [p, r] = await Promise.all([supabaseClient.from('catalogue_patients').select('*'), supabaseClient.from('plannings_dates').select('*')]);
                cataloguePatients = p.data || [];
                planningsParDate = {};
                (r.data || []).forEach(x => {
                    if (!planningsParDate[x.date_cle]) planningsParDate[x.date_cle] = [];
                    planningsParDate[x.date_cle].push({ idPlanif: x.id_planif, patientId: x.patient_id, heure: x.heure, kineNom: x.kine_nom });
                });
                modifierBadgeReseau(true);
                rafraichirAffichage();
            } catch (e) { modifierBadgeReseau(false); }
        }

        function modifierBadgeReseau(estEnLigne) {
            const b = document.getElementById('sync-badge');
            b.innerText = estEnLigne ? "Connecté 🟢" : "Hors-ligne 🔴";
            b.className = estEnLigne ? "sync-indicator sync-online" : "sync-indicator sync-offline";
        }

        function afficherPlanning() {
            const dateCle = new Date().toISOString().split('T')[0];
            const rdv = (planningsParDate[dateCle] || []).filter(r => kineVisionne === "TOUS" || r.kineNom === kineVisionne);
            document.getElementById('view-planning').innerHTML = rdv.map(r => {
                const p = cataloguePatients.find(x => String(x.id) === String(r.patientId));
                return p ? `<div class="patient-card"><div><span class="patient-name" style="cursor:pointer; color:var(--primary); text-decoration:underline;" onclick="ouvrirFormulairePatient('${p.id}')">${p.nom} ✏️</span></div></div>` : '';
            }).join('');
        }

        function ouvrirFormulairePatient(id) {
            const p = cataloguePatients.find(x => String(x.id) === String(id));
            document.getElementById('patient-id').value = p.id;
            document.getElementById('patient-nom').value = p.nom;
            document.getElementById('patient-adresse').value = p.adresse;
            document.getElementById('modal-patient').style.display = 'flex';
        }

        async function sauvegarderFichePatient() {
            const id = document.getElementById('patient-id').value;
            const p = { nom: document.getElementById('patient-nom').value, adresse: document.getElementById('patient-adresse').value };
            await supabaseClient.from('catalogue_patients').update(p).eq('id', id);
            fermerModal('modal-patient');
            chargerDonneesDepuisServeur();
        }

        function basculerVue() { /* Logique de bascule inchangée */ rafraichirAffichage(); }
        function fermerModal(id) { document.getElementById(id).style.display = 'none'; }
        function verifierConnexion() { localStorage.setItem('kine_connecte', 'true'); window.location.reload(); }
        function deconnexion() { localStorage.clear(); window.location.reload(); }
        function rafraichirAffichage() { afficherPlanning(); }
        async function chargerListeKines() { /* ... */ }
        function basculerAffichageConfig(p) { /* ... */ }
        function sauvegarderKine() { /* ... */ }
    </script>
</body>
</html>
