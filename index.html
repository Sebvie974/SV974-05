<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Planning Tournées Cabinet</title>
    <link rel="manifest" href="manifest.json">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        :root {
            --bg-color: #f4f6f9;
            --card-bg: #ffffff;
            --text-color: #333333;
            --primary: #007aff;
            --success: #34c759;
            --danger: #ff3b30;
            --neutral: #8e8e93;
            --purple: #5856d6;
            --orange: #ff9500;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            margin: 0;
            padding: 15px;
        }

        /* Écran de Connexion */
        #login-screen {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: var(--bg-color);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 100;
            gap: 15px;
        }
        .login-box {
            background: white;
            padding: 30px;
            border-radius: 16px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
            text-align: center;
            width: 90%;
            max-width: 350px;
            display: flex;
            flex-direction: column;
            gap: 12px;
            position: relative;
        }

        .btn-config-corner {
            position: absolute;
            top: 15px;
            right: 15px;
            background: transparent;
            font-size: 1.2rem;
            padding: 0;
            border: none;
            cursor: pointer;
        }

        /* Panneau admin de config des utilisateurs */
        #config-panel {
            display: none;
            border-top: 2px dashed #e5e5ea;
            margin-top: 10px;
            padding-top: 15px;
            text-align: left;
            flex-direction: column;
            gap: 8px;
        }
        .kine-list-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: #f4f6f9;
            padding: 6px 10px;
            border-radius: 6px;
            font-size: 0.85rem;
        }

        /* Interface Principale */
        #main-app { display: none; }

        header {
            background: var(--card-bg);
            padding: 15px;
            border-radius: 12px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.05);
            margin-bottom: 15px;
            position: sticky;
            top: 0;
            z-index: 10;
        }

        h1 { margin: 0; font-size: 1.4rem; color: var(--primary); }

        .user-badge {
            font-size: 0.85rem;
            background: #e5e5ea;
            padding: 4px 10px;
            border-radius: 12px;
            font-weight: bold;
            color: var(--purple);
        }

        .sync-indicator {
            font-size: 0.8rem;
            display: inline-flex;
            align-items: center;
            gap: 5px;
            padding: 4px 8px;
            border-radius: 12px;
            background: #e5e5ea;
            font-weight: bold;
        }
        .sync-online { background: #d4edda; color: #155724; }
        .sync-offline { background: #f8d7da; color: #721c24; }

        .week-selector {
            display: flex;
            align-items: center;
            justify-content: space-between;
            background: #e5e5ea;
            padding: 5px 10px;
            border-radius: 8px;
            margin-bottom: 10px;
            font-weight: bold;
            font-size: 0.9rem;
        }

        .week-btn { background: transparent; color: var(--primary); padding: 5px 10px; font-size: 1rem; border: none; cursor: pointer; }
        .days-nav { display: flex; gap: 5px; overflow-x: auto; padding-bottom: 5px; margin-bottom: 10px; }
        
        .day-btn {
            background: #e5e5ea;
            color: var(--text-color);
            padding: 8px 12px;
            border-radius: 20px;
            font-size: 0.85rem;
            white-space: nowrap;
            border: none;
            cursor: pointer;
        }
        .day-btn.active { background: var(--primary); color: white; }
        .stats { font-size: 0.9rem; color: var(--neutral); font-weight: bold; margin-bottom: 10px; }
        .actions-bar { display: flex; gap: 8px; flex-wrap: wrap; }

        button, select, input {
            border: none;
            padding: 10px 14px;
            border-radius: 8px;
            font-weight: bold;
            font-size: 0.85rem;
        }
        button { cursor: pointer; }
        button:disabled {
            opacity: 0.4 !important;
            cursor: not-allowed !important;
        }
        .btn-primary { background-color: var(--primary); color: white; flex: 1; }
        .btn-secondary { background-color: var(--neutral); color: white; }
        .btn-success { background-color: var(--success); color: white; }
        .btn-danger { background-color: var(--danger); color: white; }
        .btn-purple { background-color: var(--purple); color: white; }
        .btn-orange { background-color: var(--orange); color: white; }

        /* Vues */
        .app-view { display: none; }
        .app-view.active { display: flex; flex-direction: column; gap: 10px; }
        
        /* Cartes Patients */
        .patient-card {
            background: var(--card-bg);
            padding: 15px;
            border-radius: 12px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.03);
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-left: 5px solid var(--neutral);
        }
        .patient-card.vu { border-left-color: var(--success); }
        .patient-card.non-vu { border-left-color: var(--danger); }
        .patient-info { display: flex; flex-direction: column; gap: 4px; max-width: 60%; }
        .patient-name { font-weight: 600; font-size: 1.05rem; }
        .patient-address { font-size: 0.85rem; color: var(--neutral); text-decoration: none; }
        .kine-tag { font-size: 0.75rem; background: #e5e5ea; color: #555; padding: 2px 6px; border-radius: 4px; font-weight: bold; width: fit-content; margin-top: 2px;}

        .btn-group { display: flex; gap: 6px; align-items: center; }
        .btn-status { width: 38px; height: 38px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 1.1rem; background: #f0f0f5; }
        .btn-vu.active { background-color: var(--success); color: white; }
        .btn-nonvu.active { background-color: var(--danger); color: white; }
        .btn-icon { background: transparent; font-size: 1rem; border: none; cursor: pointer; }

        /* Modales */
        .modal {
            display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.5); z-index: 20; justify-content: center; align-items: center;
        }
        .modal-content {
            background: white; padding: 20px; border-radius: 16px; width: 90%; max-width: 400px;
            display: flex; flex-direction: column; gap: 12px; max-height: 90vh; overflow-y: auto;
        }
        .modal-content input, .modal-content select { width: 100%; padding: 10px; border-radius: 8px; border: 1px solid #ccc; box-sizing: border-box; }
        .days-checkbox-grid { display: flex; flex-direction: column; gap: 8px; background: #f4f6f9; padding: 10px; border-radius: 8px; }
    </style>
</head>
<body>

    <div id="login-screen">
        <div class="login-box">
            <button class="btn-config-corner" onclick="basculerAffichageConfig('login')" title="Gérer le personnel">⚙️</button>

            <h2 style="color: var(--primary); margin:0;">Accès Cabinet</h2>
            <p style="color: var(--neutral); font-size:0.9rem; margin:0;">Sélectionnez votre profil pour vous connecter.</p>
            
            <select id="kine-select-login" style="padding:12px; font-size:1rem; border:1px solid #ccc; font-weight: bold;">
                <option value="">Chargement des utilisateurs...</option>
            </select>

            <input type="password" id="password-input" placeholder="Votre mot de passe personnel" style="padding:12px; border:1px solid #ccc; text-align:center; font-size:1.1rem;">
            <button class="btn-primary" style="padding:12px; font-size:1rem;" onclick="verifierConnexion()">Se connecter 🔐</button>
            
            <div id="config-panel">
                <h4 style="margin: 0 0 5px 0; color: var(--purple);">⚙️ Gestion des Comptes Personnel</h4>
                <div style="display: flex; flex-direction: column; gap: 5px; margin-bottom: 10px; background: #f4f6f9; padding: 8px; border-radius: 8px;">
                    <input type="text" id="nouveau-kine-input" placeholder="Nom de l'utilisateur" style="padding:6px; border:1px solid #ccc; background: white;">
                    <input type="password" id="nouveau-mdp-input" placeholder="Mot de passe dédié" style="padding:6px; border:1px solid #ccc; background: white;">
                    <select id="nouveau-role-input" style="padding:6px; border:1px solid #ccc; background: white; font-weight: bold;">
                        <option value="kine">Rôle : Kiné</option>
                        <option value="secretariat">Rôle : Secrétariat</option>
                    </select>
                    <button class="btn-success" style="padding:8px;" onclick="ajouterNouveauKine()">Créer l'utilisateur</button>
                </div>
                <div id="liste-kines-admin" style="display: flex; flex-direction: column; gap: 5px; max-height: 120px; overflow-y: auto;">
                    </div>
            </div>
        </div>
    </div>

    <div id="main-app">
        <header>
            <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 12px;">
                <div>
                    <h1 id="app-title" style="margin-bottom: 4px;">Planning Tournées</h1>
                    <span class="user-badge" id="nom-kine-badge">Session : ...</span>
                </div>
                <div style="display:flex; flex-direction:column; gap:5px; align-items:flex-end;">
                    <div id="sync-badge" class="sync-indicator sync-online">Prêt 🟢</div>
                    <button class="btn-icon" style="font-size:0.8rem; color:var(--danger); padding:0;" onclick="deconnexion()">Déconnexion 🚪</button>
                </div>
            </div>

            <div id="zone-filtre-secretariat" style="display: none; background: #e5e5ea; padding: 10px; border-radius: 8px; margin-bottom: 12px; flex-direction: column; gap: 10px;">
                <div style="display: flex; align-items: center; justify-content: space-between; gap: 10px; width: 100%;">
                    <span style="font-weight: bold; font-size: 0.85rem; color: var(--purple);">👀 Tournée de :</span>
                    <select id="filtre-view-kine" style="flex: 1; padding: 6px; font-weight: bold;" onchange="changerFiltreVisionPraticien()"></select>
                    <button class="btn-purple" style="padding: 6px 12px; font-size: 0.8rem;" onclick="basculerAffichageConfig('interface')">Gérer le Personnel 👥</button>
                </div>
                <div id="integration-config-secretariat"></div>
            </div>

            <div style="margin-bottom: 12px;">
                <button class="btn-purple" style="width: 100%;" id="btn-toggle-view" onclick="basculerVue()">Voir le Fichier Patients 🗂️</button>
            </div>
            
            <div id="header-planning">
                <div class="week-selector">
                    <button class="week-btn" onclick="changerSemaine(-1)">◀ Préc.</button>
                    <span id="label-semaine">Semaine du ...</span>
                    <button class="week-btn" onclick="changerSemaine(1)">Suiv. ▶</button>
                </div>
                <div class="days-nav" id="days-tabs"></div>
                <div class="stats" id="tournee-stats">Chargement...</div>
                
                <div class="actions-bar">
                    <button class="btn-primary" id="btn-rapport-jour" onclick="exporterRapportJour()">Rapport Jour 📋</button>
                    <button class="btn-purple" id="btn-rapport-semaine" onclick="exporterRapportSemaine()">Rapport Hebdo 📅</button>
                    <button class="btn-success" id="btn-global-planifier" onclick="ouvrirPlanificateur()">Planifier ➕</button>
                    <button class="btn-secondary" id="btn-global-reset" onclick="reinitialiserJour()">Reset 🔄</button>
                    <button class="btn-orange" style="width:100%; margin-top:5px;" id="btn-verrouiller-jour" onclick="gererVerrouillageJour()">Valider et Verrouiller ma journée 🔒</button>
                </div>
            </div>

            <div id="header-fichier" style="display: none;">
                <button class="btn-success" style="width: 100%;" onclick="ouvrirFormulairePatient()">Créer un nouveau patient 👤➕</button>
            </div>
        </header>

        <main>
            <div class="app-view active" id="view-planning"></div>
            <div class="app-view" id="view-fichier"></div>
        </main>
    </div>

    <div class="modal" id="modal-planifier">
        <div class="modal-content">
            <h3>Planifier un patient</h3>
            <label>Praticien affecté</label>
            <select id="planif-kine-affecte" required></select>
            <label>Choisir un patient</label>
            <select id="select-patient" required></select>
            <label>Heure de passage</label>
            <input type="time" id="planif-heure" required>
            <label>Jours de passage :</label>
            <div class="days-checkbox-grid" id="conteneur-jours-checkbox"></div>
            <div style="display: flex; gap: 10px; margin-top: 10px;">
                <button class="btn-primary" onclick="ajouterAuPlanningMultiJours()">Planifier</button>
                <button class="btn-secondary" onclick="fermerModal('modal-planifier')">Annuler</button>
            </div>
        </div>
    </div>

    <div class="modal" id="modal-patient">
        <div class="modal-content">
            <h3 id="patient-modal-title">Fiche Patient</h3>
            <input type="hidden" id="patient-id">
            <label>Nom complet</label>
            <input type="text" id="patient-nom" placeholder="Mme Martine Dupont" required>
            <label>Adresse</label>
            <input type="text" id="patient-adresse" placeholder="12 rue des Fleurs, Saint-Pierre" required>
            <div style="display: flex; gap: 10px; margin-top: 10px;">
                <button class="btn-purple" onclick="sauvegarderFichePatient()">Enregistrer</button>
                <button class="btn-danger" id="btn-supprimer-fiche" onclick="supprimerFichePatient()">Supprimer</button>
                <button class="btn-secondary" onclick="fermerModal('modal-patient')">Annuler</button>
            </div>
        </div>
    </div>

    <script>
        const SUPABASE_URL = "https://fzlyucjfbjvbodqykihf.supabase.co";
        const SUPABASE_KEY = "sb_publishable_472y-YwY-VyEsRz7nqaMJg_LC3W6gDJ";
        
        let supabaseClient = null;

        const MOT_DE_PASSE_CABINET = "kine2026"; 
        const nomsJours = ['Lundi', 'Mardi', 'Mercredi', 'Jeudi', 'Vendredi'];
        
        let vueActuelle = 'planning';
        let dateAncre = new Date();
        let datesSemaineEnCours = []; 
        let indiceJourActuel = 0;

        let cataloguePatients = [];
        let planningsParDate = {};
        let journeeEstVerrouillee = false; 
        
        let kineConnecte = ""; 
        let kineRole = "kine"; 
        let kineVisionne = ""; 
        let listeUtilisateursComplets = []; 

        function initialiserSupabase() {
            if (supabaseClient === null) {
                if (typeof window.supabase !== 'undefined' && typeof window.supabase.createClient === 'function') {
                    supabaseClient = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);
                    return true;
                }
                return false;
            }
            return true;
        }

        async function chargerListeKines() {
            if (!initialiserSupabase()) return;
            try {
                const { data, error } = await supabaseClient.from('practiciens').select('*').order('nom', { ascending: true });
                if (error) throw error;
                
                listeUtilisateursComplets = data || [];
                localStorage.setItem('cache_utilisateurs', JSON.stringify(listeUtilisateursComplets));
                majSelecteursKine();
            } catch (e) {
                console.log("Lecture du personnel depuis le cache local offline :", e);
                listeUtilisateursComplets = JSON.parse(localStorage.getItem('cache_utilisateurs')) || [];
                majSelecteursKine();
            }
        }

        function majSelecteursKine() {
            const selectLogin = document.getElementById('kine-select-login');
            const conteneurAdmin = document.getElementById('liste-kines-admin');
            const filtreSec = document.getElementById('filtre-view-kine');
            
            if (selectLogin) {
                selectLogin.innerHTML = listeUtilisateursComplets.map(u => `<option value="${u.nom}">${u.nom} (${u.role === 'secretariat' ? 'Secrétariat' : 'Kiné'})</option>`).join('');
            }
            if (conteneurAdmin) {
                conteneurAdmin.innerHTML = listeUtilisateursComplets.map(u => `
                    <div class="kine-list-item">
                        <span>👤 <b>${u.nom}</b> [${u.role}]</span>
                        <button class="btn-icon" style="color:var(--danger); font-size:0.85rem;" onclick="supprimerKine('${u.nom}')">🗑️</button>
                    </div>
                `).join('');
            }
            if (filtreSec) {
                const kinesUniquement = listeUtilisateursComplets.filter(u => u.role === 'kine').map(u => u.nom);
                let optionsHTML = `<option value="TOUS">👥 Tous les praticiens</option>`;
                optionsHTML += kinesUniquement.map(k => `<option value="${k}">👤 ${k}</option>`).join('');
                filtreSec.innerHTML = optionsHTML;
                if(!kineVisionne) kineVisionne = "TOUS";
                filtreSec.value = kineVisionne;
            }
        }

        function basculerAffichageConfig(provenance) {
            const panel = document.getElementById('config-panel');
            
            if (provenance === 'login') {
                document.querySelector('.login-box').appendChild(panel);
            } else if (provenance === 'interface') {
                document.getElementById('integration-config-secretariat').appendChild(panel);
            }

            if (panel.style.display === 'flex') {
                panel.style.display = 'none';
            } else {
                const mdp = prompt("Entrez le mot de passe maître du cabinet pour administrer les accès :");
                if (mdp === MOT_DE_PASSE_CABINET) {
                    panel.style.display = 'flex';
                } else if (mdp !== null) {
                    alert("Mot de passe incorrect.");
                }
            }
        }

        async function ajouterNouveauKine() {
            const inputNom = document.getElementById('nouveau-kine-input');
            const inputMdp = document.getElementById('nouveau-mdp-input');
            const inputRole = document.getElementById('nouveau-role-input');
            
            const nom = inputNom.value.trim();
            const mdp = inputMdp.value.trim();
            const role = inputRole.value;

            if (!nom || !mdp) {
                alert("Veuillez renseigner un nom et un mot de passe.");
                return;
            }
            if (listeUtilisateursComplets.some(u => u.nom.toLowerCase() === nom.toLowerCase())) {
                alert("Cet utilisateur existe déjà.");
                return;
            }

            if (initialiserSupabase()) {
                const nouvelId = Math.floor(Math.random() * 1000000000).toString();
                const { error } = await supabaseClient.from('practiciens').insert([{ id: nouvelId, nom: nom, mot_de_passe: mdp, role: role }]);
                if (error) {
                    alert("Erreur création : " + error.message);
                } else {
                    inputNom.value = '';
                    inputMdp.value = '';
                    await chargerListeKines();
                }
            }
        }

        async function supprimerKine(nom) {
            if (confirm(`Supprimer définitivement le compte de ${nom} ?`)) {
                if (initialiserSupabase()) {
                    const { error } = await supabaseClient.from('practiciens').delete().eq('nom', nom);
                    if (error) {
                        alert("Erreur suppression : " + error.message);
                    } else {
                        await chargerListeKines();
                    }
                }
            }
        }

        function changerFiltreVisionPraticien() {
            kineVisionne = document.getElementById('filtre-view-kine').value;
            rafraichirAffichage();
        }

        function verifierConnexion() {
            const mdpSaisi = document.getElementById('password-input').value;
            const utilisateurSelectionne = document.getElementById('kine-select-login').value;
            
            if (!utilisateurSelectionne) {
                alert("Veuillez sélectionner un profil.");
                return;
            }

            const cible = listeUtilisateursComplets.find(u => u.nom === utilisateurSelectionne);
            if (cible && cible.mot_de_passe === mdpSaisi) {
                if (!initialiserSupabase()) {
                    alert("Base de données inaccessible.");
                    return;
                }
                localStorage.setItem('kine_connecte', 'true');
                localStorage.setItem('kine_nom_actif', cible.nom);
                localStorage.setItem('kine_role_actif', cible.role);
                
                kineConnecte = cible.nom;
                kineRole = cible.role;
                kineVisionne = cible.role === 'secretariat' ? 'TOUS' : cible.nom;
                
                initialiserApplication();
            } else {
                alert("Mot de passe incorrect pour cet utilisateur.");
            }
        }

        function deconnexion() {
            localStorage.removeItem('kine_connecte');
            localStorage.removeItem('kine_nom_actif');
            localStorage.removeItem('kine_role_actif');
            window.location.reload();
        }

        window.addEventListener('DOMContentLoaded', async () => {
            initialiserSupabase();
            await chargerListeKines();
            
            if (localStorage.getItem('kine_connecte') === 'true') {
                kineConnecte = localStorage.getItem('kine_nom_actif');
                kineRole = localStorage.getItem('kine_role_actif') || 'kine';
                kineVisionne = kineRole === 'secretariat' ? 'TOUS' : kineConnecte;
                
                setTimeout(() => {
                    if (initialiserSupabase()) {
                        initialiserApplication();
                    } else {
                        deconnexion();
                    }
                }, 300);
            }
        });

        function initialiserApplication() {
            document.getElementById('login-screen').style.display = 'none';
            document.getElementById('main-app').style.display = 'block';
            document.getElementById('nom-kine-badge').innerText = `Session : ${kineConnecte} (${kineRole === 'secretariat' ? 'Secrétaire' : 'Kiné'})`;
            
            if (kineRole === 'secretariat') {
                document.getElementById('zone-filtre-secretariat').style.display = 'flex';
            } else {
                document.getElementById('zone-filtre-secretariat').style.display = 'none';
            }

            calculerSemaine();
            chargerDonneesDepuisServeur();
            brancherTempsReel();
        }

        window.addEventListener('online', () => modifierBadgeReseau(true));
        window.addEventListener('offline', () => modifierBadgeReseau(false));

        function modifierBadgeReseau(estEnLigne) {
            const badge = document.getElementById('sync-badge');
            if (badge) {
                if (estEnLigne) {
                    badge.innerText = "Connecté 🟢";
                    badge.className = "sync-indicator sync-online";
                    chargerListeKines();
                    chargerDonneesDepuisServeur();
                } else {
                    badge.innerText = "Hors-ligne 🔴";
                    badge.className = "sync-indicator sync-offline";
                }
            }
        }

        async function chargerDonneesDepuisServeur() {
            if (!initialiserSupabase()) return;
            try {
                const { data: patients, error: errP } = await supabaseClient.from('catalogue_patients').select('*');
                if (errP) throw errP;
                cataloguePatients = patients || [];

                const { data: rdv, error: errR } = await supabaseClient.from('plannings_dates').select('*');
                if (errR) throw errR;

                planningsParDate = {};
                (rdv || []).forEach(r => {
                    if (!planningsParDate[r.date_cle]) planningsParDate[r.date_cle] = [];
                    planningsParDate[r.date_cle].push({
                        idPlanif: r.id_planif,
                        patientId: r.patient_id,
                        heure: r.heure ? r.heure.substring(0, 5) : "00:00",
                        statut: r.statut,
                        verrouille: r.journee_verrouillee || false,
                        kineNom: r.kine_nom || "Kiné A"
                    });
                });

                localStorage.setItem('cache_patients', JSON.stringify(cataloguePatients));
                localStorage.setItem('cache_plannings', JSON.stringify(planningsParDate));

                rafraichirAffichage();
            } catch (e) {
                console.log("Mode local temporaire actif :", e);
                cataloguePatients = JSON.parse(localStorage.getItem('cache_patients')) || [];
                planningsParDate = JSON.parse(localStorage.getItem('cache_plannings')) || {};
                modifierBadgeReseau(false);
                rafraichirAffichage();
            }
        }

        function brancherTempsReel() {
            if (!initialiserSupabase()) return;
            supabaseClient.channel('custom-all-channel')
            .on('postgres_changes', { event: '*', schema: 'public' }, () => {
                chargerListeKines();
                chargerDonneesDepuisServeur();
            })
            .subscribe();
        }

        function calculerSemaine() {
            datesSemaineEnCours = [];
            let AlignmentDay = dateAncre.getDay();
            let distanceAuLundi = AlignmentDay === 0 ? -6 : 1 - AlignmentDay;
            let lundiSemaine = new Date(dateAncre);
            lundiSemaine.setDate(dateAncre.getDate() + distanceAuLundi);

            for (let i = 0; i < 5; i++) {
                let j = new Date(lundiSemaine);
                j.setDate(lundiSemaine.getDate() + i);
                datesSemaineEnCours.push(j);
            }
            const opt = { day: '2-digit', month: '2-digit' };
            const el = document.getElementById('label-semaine');
            if (el) el.innerText = `Sem. du ${datesSemaineEnCours[0].toLocaleDateString('fr-FR', opt)} au ${datesSemaineEnCours[4].toLocaleDateString('fr-FR', opt)}`;
        }

        function changerSemaine(direction) {
            dateAncre.setDate(dateAncre.getDate() + (direction * 7));
            calculerSemaine();
            chargerDonneesDepuisServeur();
        }

        function getCleDate(dateObj) { return dateObj.toISOString().split('T')[0]; }
        function getLabelDate(dateObj) {
            const nom = nomsJours[dateObj.getDay() - 1] || 'Lundi';
            return `${nom} ${String(dateObj.getDate()).padStart(2, '0')}/${String(dateObj.getMonth() + 1).padStart(2, '0')}`;
        }

        function basculerVue() {
            const btn = document.getElementById('btn-toggle-view');
            if (vueActuelle === 'planning') {
                vueActuelle = 'fichier';
                document.getElementById('app-title').innerText = "Fichier Patients";
                btn.innerText = "Voir le Planning 🗓️";
                document.getElementById('header-planning').style.display = 'none';
                document.getElementById('header-fichier').style.display = 'block';
                document.getElementById('view-planning').classList.remove('active');
                document.getElementById('view-fichier').classList.add('active');
            } else {
                vueActuelle = 'planning';
                document.getElementById('app-title').innerText = "Planning Tournées";
                btn.innerText = "Voir le Fichier Patients 🗂️";
                document.getElementById('header-planning').style.display = 'block';
                document.getElementById('header-fichier').style.display = 'none';
                document.getElementById('view-fichier').classList.remove('active');
                document.getElementById('view-planning').classList.add('active');
            }
            rafraichirAffichage();
        }

        function rafraichirAffichage() {
            if (vueActuelle === 'planning') afficherPlanning();
            else afficherCatalogue();
        }

        function afficherPlanning() {
            const tabsConteneur = document.getElementById('days-tabs');
            if (!tabsConteneur) return;
            tabsConteneur.innerHTML = '';
            
            datesSemaineEnCours.forEach((dateObj, index) => {
                const btn = document.createElement('button');
                btn.className = `day-btn ${index === indiceJourActuel ? 'active' : ''}`;
                btn.innerText = getLabelDate(dateObj);
                btn.onclick = () => { indiceJourActuel = index; afficherPlanning(); };
                tabsConteneur.appendChild(btn);
            });

            const dateSelectionnee = datesSemaineEnCours[indiceJourActuel];
            const cleDate = getCleDate(dateSelectionnee);
            
            const tousRdvDuJour = planningsParDate[cleDate] || [];
            
            let rdvAAfficher = [];
            if (kineVisionne === "TOUS") {
                rdvAAfficher = tousRdvDuJour; 
            } else {
                rdvAAfficher = tousRdvDuJour.filter(r => r.kineNom === kineVisionne);
            }
            
            rdvAAfficher.sort((a, b) => a.heure.localeCompare(b.heure));

            // --- MISE À JOUR SÉCURITÉ MODIFICATION SECRÉTARIAT ---
            // On autorise globalement la planification et le reset si le secrétariat est connecté
            const estSecretariat = (kineRole === 'secretariat');
            
            // La journée générale n'est considérée verrouillée en vue globale que si TOUS les rendez-vous affichés le sont.
            // En vue par kiné individuel, elle dépend du verrou de ce dernier.
            if(rdvAAfficher.length > 0) {
                journeeEstVerrouillee = rdvAAfficher.every(r => r.verrouille === true);
            } else {
                journeeEstVerrouillee = false;
            }

            const btnVerrou = document.getElementById('btn-verrouiller-jour');
            if (btnVerrou) {
                if (kineVisionne === "TOUS") {
                    btnVerrou.style.display = 'none'; 
                } else {
                    btnVerrou.style.display = 'block';
                    // On recalcule le verrou spécifique à ce kiné précis pour l'affichage du bouton
                    const kineVerrouille = tousRdvDuJour.filter(r => r.kineNom === kineVisionne).some(r => r.verrouille === true);
                    if (kineVerrouille) {
                        btnVerrou.innerText = `Tournée de ${kineVisionne} Validée 🔒 (Déverrouiller)`;
                        btnVerrou.className = "btn-secondary";
                    } else {
                        btnVerrou.innerText = `Valider la journée de ${kineVisionne} 🔐`;
                        btnVerrou.className = "btn-orange";
                    }
                }
            }

            // Autorisation d'ajouter ou reset : si secrétaire, le bouton est tjs actif (sauf si tout est verrouillé)
            document.getElementById('btn-global-planifier').disabled = !estSecretariat && journeeEstVerrouillee;
            document.getElementById('btn-global-reset').disabled = kineVisionne === "TOUS" || (!estSecretariat && journeeEstVerrouillee);

            const statsEl = document.getElementById('tournee-stats');
            if (statsEl) {
                let cibleTexte = kineVisionne === "TOUS" ? "Général cabinet" : kineVisionne;
                let texteStats = `${cibleTexte} (${String(dateSelectionnee.getDate()).padStart(2,'0')}/${String(dateSelectionnee.getMonth()+1).padStart(2,'0')}) : ${rdvAAfficher.filter(r => r.statut !== null).length} / ${rdvAAfficher.length} traités`;
                statsEl.innerText = texteStats;
            }

            const conteneur = document.getElementById('view-planning');
            if (!conteneur) return;
            conteneur.innerHTML = '';

            if (rdvAAfficher.length === 0) {
                conteneur.innerHTML = `<p style="text-align:center; color:var(--neutral); margin-top:20px;">Aucun patient planifié ici.</p>`;
                return;
            }

            rdvAAfficher.forEach(rdv => {
                const patient = cataloguePatients.find(p => String(p.id) === String(rdv.patientId));
                if(!patient) return;

                const card = document.createElement('div');
                card.className = `patient-card ${rdv.statut || ''}`;
                
                // Un bouton individuel est désactivé si la ligne précise est verrouillée, SAUF si l'utilisateur est secrétaire (qui garde la main)
                const desactiveBouton = (rdv.verrouille && !estSecretariat) ? 'disabled' : '';

                card.innerHTML = `
                    <div class="patient-info">
                        <span class="patient-name">${patient.nom}</span>
                        <span style="font-size:0.85rem; font-weight:bold;">🕒 ${rdv.heure}</span>
                        <a href="http://googleusercontent.com/maps.google.com/3${encodeURIComponent(patient.adresse)}" target="_blank" class="patient-address">📍 ${patient.adresse}</a>
                        ${kineVisionne === "TOUS" ? `<span class="kine-tag">Praticien : ${rdv.kineNom} ${rdv.verrouille ? '🔒' : ''}</span>` : ''}
                    </div>
                    <div class="btn-group">
                        <button class="btn-status btn-vu ${rdv.statut === 'vu' ? 'active' : ''}" ${desactiveBouton} onclick="changerStatutRdv('${rdv.idPlanif}', 'vu')">✅</button>
                        <button class="btn-status btn-nonvu ${rdv.statut === 'non-vu' ? 'active' : ''}" ${desactiveBouton} onclick="changerStatutRdv('${rdv.idPlanif}', 'non-vu')">❌</button>
                        <button class="btn-icon" ${desactiveBouton} onclick="retirerDuPlanning('${rdv.idPlanif}')">🗑️</button>
                    </div>
                `;
                conteneur.appendChild(card);
            });
        }

        async function gererVerrouillageJour() {
            if (kineVisionne === "TOUS") return;
            const cleDate = getCleDate(datesSemaineEnCours[indiceJourActuel]);
            const tousRdvDuJour = planningsParDate[cleDate] || [];
            const rdvDuKine = tousRdvDuJour.filter(r => r.kineNom === kineVisionne);

            if (rdvDuKine.length === 0) {
                alert("Aucune donnée à verrouiller pour ce praticien.");
                return;
            }

            const kineVerrouille = rdvDuKine.some(r => r.verrouille === true);

            if (!kineVerrouille) {
                if (confirm(`Voulez-vous valider définitivement la tournée de ${kineVisionne} ?`)) {
                    if (supabaseClient) {
                        const ids = rdvDuKine.map(r => r.idPlanif);
                        await supabaseClient.from('plannings_dates').update({ journee_verrouillee: true }).in('id_planif', ids);
                        chargerDonneesDepuisServeur();
                    }
                }
            } else {
                const mdp = prompt("Entrez le mot de passe maître du cabinet pour forcer le déverrouillage :");
                if (mdp === MOT_DE_PASSE_CABINET) {
                    if (supabaseClient) {
                        const ids = rdvDuKine.map(r => r.idPlanif);
                        await supabaseClient.from('plannings_dates').update({ journee_verrouillee: false }).in('id_planif', ids);
                        chargerDonneesDepuisServeur();
                    }
                } else if (mdp !== null) {
                    alert("Mot de passe incorrect.");
                }
            }
        }

        async function changerStatutRdv(idPlanif, statutBouton) {
            // Trouver le rdv peu importe la date
            let rdv Trouve = null;
            Object.keys(planningsParDate).forEach(cle => {
                const cible = planningsParDate[cle].find(r => r.idPlanif === idPlanif);
                if(cible) rdvTrouve = cible;
            });
            if (!rdvTrouve) return;

            const nouveauStatut = rdvTrouve.statut === statutBouton ? null : statutBouton;
            rdvTrouve.statut = nouveauStatut;
            rafraichirAffichage();

            if (supabaseClient) {
                await supabaseClient.from('plannings_dates').update({ statut: nouveauStatut }).eq('id_planif', idPlanif);
            }
        }

        async function ajouterAuPlanningMultiJours() {
            const praticienCible = document.getElementById('planif-kine-affecte').value;
            const patientId = document.getElementById('select-patient').value;
            const heure = document.getElementById('planif-heure').value || "00:00";
            const checkboxes = document.querySelectorAll('input[name="jours-planif"]:checked');

            if(!praticienCible || !patientId || checkboxes.length === 0) {
                alert("Veuillez sélectionner un praticien, un patient et au moins un jour.");
                return;
            }

            const lignesAInserer = [];
            checkboxes.forEach(cb => {
                const dateCible = datesSemaineEnCours[parseInt(cb.value)];
                lignesAInserer.push({
                    id_planif: Math.floor(Math.random() * 1000000000).toString(),
                    patient_id: patientId,
                    date_cle: getCleDate(dateCible),
                    heure: heure,
                    statut: null,
                    journee_verrouillee: false,
                    kine_nom: praticienCible
                });
            });

            fermerModal('modal-planifier');
            if (supabaseClient) {
                const { error } = await supabaseClient.from('plannings_dates').insert(lignesAInserer);
                if(error) alert("Erreur lors de la planification : " + error.message);
                chargerDonneesDepuisServeur();
            }
        }

        async function retirerDuPlanning(idPlanif) {
            if (confirm("Retirer ce rendez-vous ?")) {
                if (supabaseClient) {
                    await supabaseClient.from('plannings_dates').delete().eq('id_planif', idPlanif);
                    chargerDonneesDepuisServeur();
                }
            }
        }

        async function reinitialiserJour() {
            if (kineVisionne === "TOUS") return;
            if (confirm(`Réinitialiser les statuts de la tournée de ${kineVisionne} ?`)) {
                const cleDate = getCleDate(datesSemaineEnCours[indiceJourActuel]);
                const tousRdv = planningsParDate[cleDate] || [];
                const ids = tousRdv.filter(r => r.kineNom === kineVisionne).map(r => r.idPlanif);
                
                if(ids.length > 0 && supabaseClient) {
                    await supabaseClient.from('plannings_dates').update({ statut: null }).in('id_planif', ids);
                    chargerDonneesDepuisServeur();
                }
            }
        }

        function afficherCatalogue() {
            const conteneur = document.getElementById('view-fichier');
            if (!conteneur) return;
            conteneur.innerHTML = '';

            cataloguePatients.sort((a,b) => a.nom.localeCompare(b.nom)).forEach(p => {
                const card = document.createElement('div');
                card.className = 'patient-card';
                card.style.borderLeftColor = 'var(--purple)';
                card.innerHTML = `
                    <div class="patient-info">
                        <span class="patient-name">${p.nom}</span>
                        <span style="font-size:0.85rem; color:var(--neutral);">📍 ${p.adresse}</span>
                    </div>
                    <div class="btn-group">
                        <button class="btn-primary" style="background-color: var(--purple);" onclick="ouvrirFormulairePatient('${p.id}')">✏️ Modifier</button>
                    </div>
                `;
                conteneur.appendChild(card);
            });
        }

        async function sauvegarderFichePatient() {
            const id = document.getElementById('patient-id').value;
            const nom = document.getElementById('patient-nom').value.trim();
            const adresse = document.getElementById('patient-adresse').value.trim();

            if(!nom || !adresse) { alert("Veuillez remplir le nom et l'adresse."); return; }
            fermerModal('modal-patient');

            if (!initialiserSupabase()) return;

            if (id) {
                const { error } = await supabaseClient.from('catalogue_patients').update({ nom, adresse }).eq('id', id);
                if (error) alert("Erreur modification : " + error.message);
            } else {
                const nouvelId = Math.floor(Math.random() * 1000000000).toString(); 
                const { error } = await supabaseClient.from('catalogue_patients').insert([{ id: nouvelId, nom, adresse }]);
                if (error) alert("Erreur création : " + error.message);
            }
            chargerDonneesDepuisServeur();
        }

        async function supprimerFichePatient() {
            const id = document.getElementById('patient-id').value;
            if (id && confirm("Supprimer définitivement ce patient ?") && supabaseClient) {
                fermerModal('modal-patient');
                await supabaseClient.from('catalogue_patients').delete().eq('id', id);
                chargerDonneesDepuisServeur();
            }
        }

        function ouvrirModal(id) { document.getElementById(id).style.display = 'flex'; }
        function fermerModal(id) { document.getElementById(id).style.display = 'none'; }

        function ouvrirPlanificateur() {
            const selectPatient = document.getElementById('select-patient');
            const selectKineAffecte = document.getElementById('planif-kine-affecte');
            if (!selectPatient || !selectKineAffecte) return;
            
            selectPatient.innerHTML = '';
            if(cataloguePatients.length === 0) { alert("Le catalogue patient est vide."); return; }

            cataloguePatients.sort((a,b) => a.nom.localeCompare(b.nom)).forEach(p => {
                selectPatient.innerHTML += `<option value="${p.id}">${p.nom}</option>`;
            });

            const kinesDispos = listeUtilisateursComplets.filter(u => u.role === 'kine');
            selectKineAffecte.innerHTML = kinesDispos.map(u => `<option value="${u.nom}">${u.nom}</option>`).join('');
            
            if (kineVisionne !== "TOUS") {
                selectKineAffecte.value = kineVisionne;
            }

            const conteneurJours = document.getElementById('conteneur-jours-checkbox');
            if (!conteneurJours) return;
            conteneurJours.innerHTML = '';
            datesSemaineEnCours.forEach((dateObj, index) => {
                conteneurJours.innerHTML += `
                    <label style="display:flex; gap:10px; align-items:center;">
                        <input type="checkbox" name="jours-planif" value="${index}" ${index === indiceJourActuel ? 'checked' : ''}>
                        ${getLabelDate(dateObj)}
                    </label>
                `;
            });
            ouvrirModal('modal-planifier');
        }

        function ouvrirFormulairePatient(id = '') {
            if(id) {
                const p = cataloguePatients.find(item => String(item.id) === String(id));
                if(!p) return;
                document.getElementById('patient-modal-title').innerText = "Modifier la fiche";
                document.getElementById('patient-id').value = p.id;
                document.getElementById('patient-nom').value = p.nom;
                document.getElementById('patient-adresse').value = p.adresse;
                document.getElementById('btn-supprimer-fiche').style.display = 'block';
            } else {
                document.getElementById('patient-modal-title').innerText = "Nouveau patient";
                document.getElementById('patient-id').value = '';
                document.getElementById('patient-nom').value = '';
                document.getElementById('patient-adresse').value = '';
                document.getElementById('btn-supprimer-fiche').style.display = 'none';
            }
            ouvrirModal('modal-patient');
        }

        function genererBlocRapport(rdvs) {
            let vus = [], absents = [], nonTraites = [];
            rdvs.forEach(r => {
                const p = cataloguePatients.find(item => String(item.id) === String(r.patientId));
                if (!p) return;
                let ligne = `  - [${r.heure}] ${p.nom}`;
                if (kineVisionne === "TOUS") ligne += ` (Par: ${r.kineNom})`;
                
                if (r.statut === 'vu') vus.push(ligne);
                else if (r.statut === 'non-vu') absents.push(ligne);
                else nonTraites.push(ligne);
            });
            let texte = "";
            if(vus.length) texte += `🟢 *Patients vus :*\n${vus.join('\n')}\n`;
            if(absents.length) texte += `🔴 *Absents :*\n${absents.join('\n')}\n`;
            if(nonTraites.length) texte += `⚪ *Non traités / Prévus :*\n${nonTraites.join('\n')}\n`;
            return texte || " Aucun patient programmé.\n";
        }

        function exporterRapportJour() {
            const dateObj = datesSemaineEnCours[indiceJourActuel];
            const tousRdvs = planningsParDate[getCleDate(dateObj)] || [];
            
            let rdvsCibles = kineVisionne === "TOUS" ? tousRdvs : tousRdvs.filter(r => r.kineNom === kineVisionne);
            let cibleTexte = kineVisionne === "TOUS" ? "GLOBAL CABINET" : kineVisionne;

            let texte = `*Rapport du ${getLabelDate(dateObj)} - ${cibleTexte}*\n\n${genererBlocRapport(rdvsCibles)}`;
            navigator.clipboard.writeText(texte).then(() => alert("Rapport journalier copié !"));
        }

        function exporterRapportSemaine() {
            let cibleTexte = kineVisionne === "TOUS" ? "GLOBAL CABINET" : kineVisionne;
            let texte = `📅 *BILAN HEBDOMADAIRE - ${cibleTexte}*\n\n`;
            
            datesSemaineEnCours.forEach(d => {
                const tousRdvs = planningsParDate[getCleDate(d)] || [];
                let rdvsCibles = kineVisionne === "TOUS" ? tousRdvs : tousRdvs.filter(r => r.kineNom === kineVisionne);
                texte += `▶️ *${getLabelDate(d).toUpperCase()}*\n${genererBlocRapport(rdvsCibles)}\n`;
            });
            navigator.clipboard.writeText(texte).then(() => alert("Bilan hebdomadaire copié !"));
        }

        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => { navigator.serviceWorker.register('sw.js'); });
        }
    </script>
</body>
