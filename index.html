<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Planning Tournées Cabinet</title>
    <link rel="manifest" href="manifest.json">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        :root {
            --bg-color: #f4f6f9;
            --card-bg: #ffffff;
            --text-color: #333333;
            --primary: #007aff;
            --success: #34c759;
            --danger: #ff3b30;
            --neutral: #8e8e93;
            --purple: #5856d6;
            --orange: #ff9500;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            margin: 0;
            padding: 15px;
        }

        #login-screen {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: var(--bg-color);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 100;
        }
        .login-box {
            background: white;
            padding: 30px;
            border-radius: 16px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
            text-align: center;
            width: 90%;
            max-width: 350px;
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        #main-app { display: none; }

        header {
            background: var(--card-bg);
            padding: 15px;
            border-radius: 12px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.05);
            margin-bottom: 15px;
            position: sticky;
            top: 0;
            z-index: 10;
        }

        h1 { margin: 0; font-size: 1.4rem; color: var(--primary); }

        .user-badge {
            font-size: 0.85rem;
            background: #e5e5ea;
            padding: 4px 10px;
            border-radius: 12px;
            font-weight: bold;
            color: var(--purple);
            display: inline-block;
        }

        .sync-indicator {
            font-size: 0.8rem;
            display: inline-flex;
            align-items: center;
            gap: 5px;
            padding: 4px 8px;
            border-radius: 12px;
            background: #e5e5ea;
            font-weight: bold;
        }
        .sync-online { background: #d4edda; color: #155724; }
        .sync-offline { background: #f8d7da; color: #721c24; }

        .week-selector {
            display: flex;
            align-items: center;
            justify-content: space-between;
            background: #e5e5ea;
            padding: 5px 10px;
            border-radius: 8px;
            margin-bottom: 10px;
            font-weight: bold;
            font-size: 0.9rem;
        }

        .week-btn { background: transparent; color: var(--primary); padding: 5px 10px; font-size: 1rem; border: none; cursor: pointer; }
        .days-nav { display: flex; gap: 5px; overflow-x: auto; padding-bottom: 5px; margin-bottom: 10px; }
        
        .day-btn {
            background: #e5e5ea;
            color: var(--text-color);
            padding: 8px 12px;
            border-radius: 20px;
            font-size: 0.85rem;
            white-space: nowrap;
            border: none;
            cursor: pointer;
        }
        .day-btn.active { background: var(--primary); color: white; }
        .stats { font-size: 0.9rem; color: var(--neutral); font-weight: bold; margin-bottom: 10px; }
        .actions-bar { display: flex; gap: 8px; flex-wrap: wrap; }

        button, select, input {
            border: none;
            padding: 10px 14px;
            border-radius: 8px;
            font-weight: bold;
            font-size: 0.85rem;
        }
        button { cursor: pointer; }
        button:disabled { opacity: 0.4 !important; cursor: not-allowed !important; }
        .btn-primary { background-color: var(--primary); color: white; flex: 1; }
        .btn-secondary { background-color: var(--neutral); color: white; }
        .btn-success { background-color: var(--success); color: white; }
        .btn-danger { background-color: var(--danger); color: white; }
        .btn-purple { background-color: var(--purple); color: white; }
        .btn-orange { background-color: var(--orange); color: white; }

        .nav-menu { display: flex; gap: 5px; margin-bottom: 12px; }
        .nav-menu button { flex: 1; padding: 8px 4px; }

        .app-view { display: none; }
        .app-view.active { display: flex; flex-direction: column; gap: 10px; }
        
        .patient-card {
            background: var(--card-bg);
            padding: 15px;
            border-radius: 12px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.03);
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-left: 5px solid var(--neutral);
        }
        .patient-card.vu { border-left-color: var(--success); }
        .patient-card.non-vu { border-left-color: var(--danger); }
        .patient-info { display: flex; flex-direction: column; gap: 4px; max-width: 60%; }
        .patient-name { font-weight: 600; font-size: 1.05rem; }
        .patient-address { font-size: 0.85rem; color: var(--neutral); text-decoration: none; }

        .btn-group { display: flex; gap: 6px; align-items: center; }
        .btn-status { width: 38px; height: 38px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 1.1rem; background: #f0f0f5; }
        .btn-vu.active { background-color: var(--success); color: white; }
        .btn-nonvu.active { background-color: var(--danger); color: white; }
        .btn-icon { background: transparent; font-size: 1rem; border: none; cursor: pointer; }

        .modal {
            display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.5); z-index: 20; justify-content: center; align-items: center;
        }
        .modal-content {
            background: white; padding: 20px; border-radius: 16px; width: 90%; max-width: 400px;
            display: flex; flex-direction: column; gap: 12px; max-height: 90vh; overflow-y: auto;
        }
        .modal-content input, .modal-content select { width: 100%; padding: 10px; border-radius: 8px; border: 1px solid #ccc; box-sizing: border-box; }
        .days-checkbox-grid { display: flex; flex-direction: column; gap: 8px; background: #f4f6f9; padding: 10px; border-radius: 8px; }
    </style>
</head>
<body>

    <div id="login-screen">
        <div class="login-box">
            <h2 style="color: var(--primary); margin:0;">Accès Cabinet</h2>
            <p style="color: var(--neutral); font-size:0.9rem; margin:0;">Sélectionnez votre compte pour vous connecter.</p>
            
            <select id="user-select-login" style="padding:12px; font-size:1rem; border:1px solid #ccc;">
                <option value="">Chargement des utilisateurs...</option>
            </select>

            <input type="password" id="password-input" placeholder="Mot de passe personnalisé" style="padding:12px; border:1px solid #ccc; text-align:center; font-size:1.1rem;">
            <button class="btn-primary" style="padding:12px; font-size:1rem;" onclick="verifierConnexion()">Se connecter 🔐</button>
        </div>
    </div>

    <div id="main-app">
        <header>
            <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 12px;">
                <div>
                    <h1 id="app-title" style="margin-bottom: 4px;">Planning Tournées</h1>
                    <span class="user-badge" id="nom-kine-badge">Session : ...</span>
                </div>
                <div style="display:flex; flex-direction:column; gap:5px; align-items:flex-end;">
                    <div id="sync-badge" class="sync-indicator sync-online">Prêt 🟢</div>
                    <button class="btn-icon" style="font-size:0.8rem; color:var(--danger); padding:0;" onclick="deconnexion()">Déconnexion 🚪</button>
                </div>
            </div>

            <div id="wrapper-vue-secretariat" style="display:none; background:#f0f0f5; padding:10px; border-radius:8px; margin-bottom:12px; flex-direction:column; gap:4px;">
                <label style="font-size:0.8rem; font-weight:bold; color:var(--neutral)">👁️ Voir la session de :</label>
                <select id="select-session-secretariat" style="width:100%; border:1px solid #ccc; padding:8px;" onchange="changerSessionFiltreSecretariat()"></select>
            </div>

            <div class="nav-menu">
                <button class="btn-primary" id="nav-btn-planning" onclick="changerVue('planning')">Planning 🗓️</button>
                <button class="btn-secondary" id="nav-btn-fichier" onclick="changerVue('fichier')">Patients 🗂️</button>
                <button class="btn-secondary" id="nav-btn-equipe" style="display:none;" onclick="changerVue('equipe')">Équipe 👥</button>
            </div>
            
            <div id="header-planning">
                <div class="week-selector">
                    <button class="week-btn" onclick="changerSemaine(-1)">◀ Préc.</button>
                    <span id="label-semaine">Semaine du ...</span>
                    <button class="week-btn" onclick="changerSemaine(1)">Suiv. ▶</button>
                </div>
                <div class="days-nav" id="days-tabs"></div>
                <div class="stats" id="tournee-stats">Chargement...</div>
                
                <div class="actions-bar">
                    <button class="btn-primary" onclick="exporterRapportJour()">Rapport Jour 📋</button>
                    <button class="btn-purple" onclick="exporterRapportSemaine()">Rapport Hebdo 📅</button>
                    <button class="btn-success" id="btn-global-planifier" onclick="ouvrirPlanificateur()">Planifier ➕</button>
                    <button class="btn-secondary" id="btn-global-reset" onclick="reinitialiserJour()">Reset 🔄</button>
                    <button class="btn-orange" style="width:100%; margin-top:5px;" id="btn-verrouiller-jour" onclick="gererVerrouillageJour()">Valider et Verrouiller cette journée 🔒</button>
                </div>
            </div>

            <div id="header-fichier" style="display: none;">
                <button class="btn-success" style="width: 100%;" onclick="ouvrirFormulairePatient()">Créer un nouveau patient 👤➕</button>
            </div>

            <div id="header-equipe" style="display: none;">
                <button class="btn-purple" style="width: 100%;" onclick="ouvrirFormulaireUtilisateur()">Ajouter un membre à l'équipe 👥➕</button>
            </div>
        </header>

        <main>
            <div class="app-view active" id="view-planning"></div>
            <div class="app-view" id="view-fichier"></div>
            <div class="app-view" id="view-equipe"></div>
        </main>
    </div>

    <div class="modal" id="modal-planifier">
        <div class="modal-content">
            <h3>Planifier un patient</h3>
            <label>Choisir un patient</label>
            <select id="select-patient" required></select>
            <label>Heure de passage</label>
            <input type="time" id="planif-heure" required>
            <label>Jours de passage :</label>
            <div class="days-checkbox-grid" id="conteneur-jours-checkbox"></div>
            <div style="display: flex; gap: 10px; margin-top: 10px;">
                <button class="btn-primary" onclick="ajouterAuPlanningMultiJours()">Planifier</button>
                <button class="btn-secondary" onclick="fermerModal('modal-planifier')">Annuler</button>
            </div>
        </div>
    </div>

    <div class="modal" id="modal-patient">
        <div class="modal-content">
            <h3 id="patient-modal-title">Fiche Patient</h3>
            <input type="hidden" id="patient-id">
            <label>Nom complet</label>
            <input type="text" id="patient-nom" placeholder="Mme Martine Dupont" required>
            <label>Adresse</label>
            <input type="text" id="patient-adresse" placeholder="12 rue des Fleurs" required>
            <div style="display: flex; gap: 10px; margin-top: 10px;">
                <button class="btn-purple" onclick="sauvegarderFichePatient()">Enregistrer</button>
                <button class="btn-danger" id="btn-supprimer-fiche" onclick="supprimerFichePatient()">Supprimer</button>
                <button class="btn-secondary" onclick="fermerModal('modal-patient')">Annuler</button>
            </div>
        </div>
    </div>

    <div class="modal" id="modal-utilisateur">
        <div class="modal-content">
            <h3 id="user-modal-title">Fiche Utilisateur</h3>
            <input type="hidden" id="user-id">
            <label>Nom ou Prénom</label>
            <input type="text" id="user-nom" placeholder="Ex: Prénom ou Cabinet" required>
            <label>Rôle</label>
            <select id="user-role">
                <option value="kine">Kiné (Tournée individuelle)</option>
                <option value="secretariat">Secrétariat (Accès total)</option>
            </select>
            <label>Mot de passe personnel</label>
            <input type="text" id="user-mdp" placeholder="Code secret" required>
            <div style="display: flex; gap: 10px; margin-top: 10px;">
                <button class="btn-primary" onclick="sauvegarderUtilisateur()">Enregistrer</button>
                <button class="btn-danger" id="btn-supprimer-user" onclick="supprimerUtilisateur()">Supprimer</button>
                <button class="btn-secondary" onclick="fermerModal('modal-utilisateur')">Annuler</button>
            </div>
        </div>
    </div>

    <script>

        let supabaseClient = null;
        const nomsJours = ['Lundi', 'Mardi', 'Mercredi', 'Jeudi', 'Vendredi'];
        
        let vueActuelle = 'planning';
        let dateAncre = new Date();
        let datesSemaineEnCours = []; 
        let indiceJourActuel = 0;

        let cataloguePatients = [];
        let listeUtilisateurs = [];
        let planningsParDate = {};
        let journeeEstVerrouillee = false; 
        
        let utilisateurConnecte = null; // Objet utilisateur complet
        let sessionFiltreNom = ""; // Le nom du kiné dont on regarde actuellement la tournée

        function initialiserSupabase()
